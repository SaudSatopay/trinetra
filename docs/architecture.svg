<svg viewBox="0 0 1000 690" xmlns="http://www.w3.org/2000/svg" role="img" font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, sans-serif">
  <title>Trinetra — compound-risk intelligence architecture</title>
  <desc>A digital-twin data layer (gas sensors, permits, CCTV, regulatory corpus) feeds a LangGraph multi-agent layer, a hybrid compound-risk reasoner, an autonomous response orchestrator, and a Next.js control room over FastAPI.</desc>
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#3a4a5a"/>
    </marker>
  </defs>
  <rect width="1000" height="690" fill="#0b0f14"/>

  <!-- brand -->
  <path d="M40 26 L58 52 L22 52 Z" fill="none" stroke="#34d3bd" stroke-width="2" stroke-linejoin="round"/>
  <circle cx="40" cy="44" r="5.5" fill="none" stroke="#34d3bd" stroke-width="1.6"/>
  <circle cx="40" cy="44" r="2" fill="#34d3bd"/>
  <text x="78" y="42" fill="#eaf2fa" font-size="26" font-weight="700" letter-spacing="5">TRINETRA</text>
  <text x="80" y="61" fill="#34d3bd" font-size="10.5" letter-spacing="2.5" font-family="ui-monospace, monospace">COMPOUND-RISK INTELLIGENCE · ZERO-HARM OPERATIONS</text>

  <!-- ===== DATA ===== -->
  <text x="40" y="104" fill="#5f6e7e" font-size="10" letter-spacing="2" font-family="ui-monospace, monospace">DATA · DIGITAL TWIN</text>
  <g font-size="13" font-weight="600">
    <g>
      <rect x="40" y="114" width="216" height="58" rx="9" fill="#121821" stroke="#26313e"/>
      <text x="58" y="140" fill="#eaf2fa">IoT Gas Sensors</text>
      <text x="58" y="159" fill="#6b7888" font-size="10" font-weight="400" font-family="ui-monospace, monospace">CH4 · CO · H2S · O2</text>
    </g>
    <g>
      <rect x="288" y="114" width="216" height="58" rx="9" fill="#121821" stroke="#26313e"/>
      <text x="306" y="140" fill="#eaf2fa">Permits-to-Work</text>
      <text x="306" y="159" fill="#6b7888" font-size="10" font-weight="400" font-family="ui-monospace, monospace">hot-work · confined space</text>
    </g>
    <g>
      <rect x="536" y="114" width="216" height="58" rx="9" fill="#121821" stroke="#26313e"/>
      <text x="554" y="140" fill="#eaf2fa">CCTV Feed</text>
      <text x="554" y="159" fill="#6b7888" font-size="10" font-weight="400" font-family="ui-monospace, monospace">worker · zone intrusion</text>
    </g>
    <g>
      <rect x="784" y="114" width="176" height="58" rx="9" fill="#121821" stroke="#26313e"/>
      <text x="802" y="140" fill="#eaf2fa">Reg. Corpus</text>
      <text x="802" y="159" fill="#6b7888" font-size="10" font-weight="400" font-family="ui-monospace, monospace">OISD · incidents</text>
    </g>
  </g>

  <!-- data -> agents -->
  <g stroke="#2a3a48" stroke-width="1.5">
    <line x1="148" y1="172" x2="148" y2="206" marker-end="url(#ar)"/>
    <line x1="396" y1="172" x2="396" y2="206" marker-end="url(#ar)"/>
    <line x1="644" y1="172" x2="644" y2="206" marker-end="url(#ar)"/>
    <line x1="872" y1="172" x2="872" y2="206" marker-end="url(#ar)"/>
  </g>

  <!-- ===== AGENTS ===== -->
  <text x="40" y="201" fill="#5f6e7e" font-size="10" letter-spacing="2" font-family="ui-monospace, monospace">INTELLIGENCE · LANGGRAPH MULTI-AGENT</text>
  <g font-size="13" font-weight="600">
    <g>
      <rect x="40" y="210" width="216" height="58" rx="9" fill="#101820" stroke="#2c5f57"/>
      <text x="58" y="236" fill="#eaf2fa">Sensor Agent</text>
      <text x="58" y="255" fill="#6b7888" font-size="10" font-weight="400" font-family="ui-monospace, monospace">trend + slope</text>
    </g>
    <g>
      <rect x="288" y="210" width="216" height="58" rx="9" fill="#101820" stroke="#2c5f57"/>
      <text x="306" y="236" fill="#eaf2fa">Permit Agent</text>
      <text x="306" y="255" fill="#6b7888" font-size="10" font-weight="400" font-family="ui-monospace, monospace">ignition · conflict</text>
    </g>
    <g>
      <rect x="536" y="210" width="216" height="58" rx="9" fill="#101820" stroke="#2c5f57"/>
      <text x="554" y="236" fill="#eaf2fa">Vision Agent</text>
      <text x="554" y="255" fill="#34d3bd" font-size="10" font-weight="400" font-family="ui-monospace, monospace">YOLOv8</text>
    </g>
    <g>
      <rect x="784" y="210" width="176" height="58" rx="9" fill="#101820" stroke="#2c5f57"/>
      <text x="802" y="236" fill="#eaf2fa">Context Agent</text>
      <text x="802" y="255" fill="#34d3bd" font-size="10" font-weight="400" font-family="ui-monospace, monospace">Gemini RAG</text>
    </g>
  </g>

  <!-- agents -> reasoner (bus) -->
  <g stroke="#2a3a48" stroke-width="1.5" fill="none">
    <line x1="148" y1="268" x2="148" y2="292"/>
    <line x1="396" y1="268" x2="396" y2="292"/>
    <line x1="644" y1="268" x2="644" y2="292"/>
    <line x1="872" y1="268" x2="872" y2="292"/>
    <line x1="148" y1="292" x2="872" y2="292"/>
    <line x1="500" y1="292" x2="500" y2="312" marker-end="url(#ar)"/>
  </g>

  <!-- ===== REASONER ===== -->
  <rect x="40" y="316" width="920" height="62" rx="10" fill="#0f1a1c" stroke="#34d3bd" stroke-width="1.6"/>
  <circle cx="70" cy="347" r="6" fill="none" stroke="#34d3bd" stroke-width="1.6"/><circle cx="70" cy="347" r="2" fill="#34d3bd"/>
  <text x="92" y="343" fill="#eaf2fa" font-size="15" font-weight="700">Compound-Risk Reasoner</text>
  <text x="92" y="362" fill="#8aa6a0" font-size="10.5" font-family="ui-monospace, monospace">hybrid: deterministic engine + LLM · knowledge graph</text>
  <text x="936" y="343" fill="#34d3bd" font-size="11" text-anchor="end" font-family="ui-monospace, monospace">100/100</text>
  <text x="936" y="360" fill="#5f6e7e" font-size="9" text-anchor="end" font-family="ui-monospace, monospace">compound · lead-time</text>

  <!-- reasoner -> orchestrator -->
  <line x1="500" y1="378" x2="500" y2="400" stroke="#2a3a48" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="512" y="394" fill="#fb3b4e" font-size="9" font-family="ui-monospace, monospace">if compound</text>

  <!-- ===== ORCHESTRATOR ===== -->
  <rect x="40" y="404" width="920" height="60" rx="10" fill="#190f12" stroke="#fb3b4e" stroke-width="1.6"/>
  <circle cx="70" cy="434" r="5" fill="#fb3b4e"/>
  <text x="92" y="430" fill="#eaf2fa" font-size="15" font-weight="700">Response Orchestrator</text>
  <text x="92" y="449" fill="#b88" font-size="10.5" font-family="ui-monospace, monospace">alert · evacuate · OISD report · EN / Telugu / Hindi</text>

  <!-- orchestrator -> presentation -->
  <line x1="500" y1="464" x2="500" y2="492" stroke="#2a3a48" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- ===== PRESENTATION ===== -->
  <text x="40" y="487" fill="#5f6e7e" font-size="10" letter-spacing="2" font-family="ui-monospace, monospace">PRESENTATION</text>
  <rect x="40" y="496" width="920" height="60" rx="10" fill="#121821" stroke="#26313e"/>
  <text x="62" y="522" fill="#eaf2fa" font-size="15" font-weight="700">Next.js Control Room</text>
  <text x="62" y="541" fill="#6b7888" font-size="10.5" font-family="ui-monospace, monospace">geospatial HMI · disaster memory · CCTV · response modal</text>
  <text x="938" y="530" fill="#5f6e7e" font-size="10" text-anchor="end" font-family="ui-monospace, monospace">FastAPI REST + WebSocket</text>

  <!-- legend + metrics -->
  <g font-family="ui-monospace, monospace" font-size="10">
    <rect x="40" y="600" width="12" height="12" rx="3" fill="none" stroke="#34d3bd" stroke-width="1.5"/>
    <text x="58" y="610" fill="#8a98a6">Trinetra intelligence</text>
    <rect x="210" y="600" width="12" height="12" rx="3" fill="none" stroke="#fb3b4e" stroke-width="1.5"/>
    <text x="228" y="610" fill="#8a98a6">compound-hazard response path</text>
  </g>
  <text x="40" y="648" fill="#eaf2fa" font-size="13" font-weight="600">100% compound recall<tspan fill="#5f6e7e" font-weight="400">  ·  </tspan>0% false-positive<tspan fill="#5f6e7e" font-weight="400">  ·  </tspan>7.4 min mean early-warning</text>
  <text x="40" y="668" fill="#5f6e7e" font-size="10" font-family="ui-monospace, monospace">29-scenario benchmark · deterministic (seed=42) · vs single-sensor baseline</text>
</svg>
