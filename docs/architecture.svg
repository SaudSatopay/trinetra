<svg viewBox="0 0 1200 860" xmlns="http://www.w3.org/2000/svg" role="img" fill="#C6B9A6" font-family="Bahnschrift, 'Segoe UI', system-ui, sans-serif">
  <title>Trinetra — compound-risk intelligence: system architecture</title>
  <desc>Plant data (gas sensors, permit-to-work, CCTV, shift logs, SCADA) is ingested over OPC-UA / MQTT / CSV into a digital twin, scored by a deterministic compound-risk engine (the decision core), enriched by an LLM-assisted intelligence layer that only explains/retrieves/drafts, then handed to a response orchestrator and a Next.js control room over FastAPI. Hybrid by design: no LLM in the life-safety decision.</desc>
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#7c6f5e"/>
    </marker>
    <marker id="arB" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#FF6A1A"/>
    </marker>
    <style>
      text { font-family: Bahnschrift, "Segoe UI", system-ui, -apple-system, sans-serif; fill: #C6B9A6; }
      .mono { font-family: "Cascadia Mono", Consolas, ui-monospace, monospace; }
      .h { fill: #F7EFE1; font-weight: 700; }
      .lbl { font-family: "Cascadia Mono", Consolas, monospace; fill: #8A7B68; font-size: 10px; letter-spacing: 1.6px; }
      .br { fill: #FF6A1A; }
      .dim { fill: #8A7B68; }
    </style>
  </defs>

  <rect width="1200" height="860" fill="#0B0908"/>

  <!-- ===== header ===== -->
  <path d="M44 20 L63 58 L25 58 Z" fill="none" stroke="#FF6A1A" stroke-width="2.2" stroke-linejoin="round"/>
  <ellipse cx="44" cy="47" rx="8.5" ry="5.2" fill="none" stroke="#FF6A1A" stroke-width="1.6"/>
  <circle cx="44" cy="47" r="2" fill="#FF6A1A"/>
  <text x="86" y="40" class="h" font-size="27" letter-spacing="5">TRINETRA</text>
  <text x="88" y="60" class="mono br" font-size="10.5" letter-spacing="2.5">COMPOUND-RISK INTELLIGENCE · SYSTEM ARCHITECTURE</text>
  <line x1="40" y1="80" x2="1160" y2="80" stroke="#2A2118" stroke-width="1"/>

  <!-- ===== DATA SOURCES ===== -->
  <text x="40" y="106" class="lbl">DATA SOURCES · DIGITAL TWIN</text>
  <g font-size="13">
    <g><rect x="40" y="112" width="128" height="66" rx="7" fill="#120D08" stroke="#2A2118"/>
      <text x="56" y="142" class="h" font-size="13">Gas sensors</text><text x="56" y="161" class="mono dim" font-size="9.5">CH4·CO·H2S·O2</text></g>
    <g><rect x="178" y="112" width="128" height="66" rx="7" fill="#120D08" stroke="#2A2118"/>
      <text x="194" y="142" class="h" font-size="13">Permit-to-work</text><text x="194" y="161" class="mono dim" font-size="9.5">hot-work·confined</text></g>
    <g><rect x="316" y="112" width="128" height="66" rx="7" fill="#120D08" stroke="#2A2118"/>
      <text x="332" y="142" class="h" font-size="13">CCTV</text><text x="332" y="161" class="mono dim" font-size="9.5">person·intrusion</text></g>
    <g><rect x="454" y="112" width="128" height="66" rx="7" fill="#120D08" stroke="#2A2118"/>
      <text x="470" y="142" class="h" font-size="13">Shift logs</text><text x="470" y="161" class="mono dim" font-size="9.5">handover window</text></g>
    <g><rect x="592" y="112" width="128" height="66" rx="7" fill="#120D08" stroke="#2A2118"/>
      <text x="608" y="142" class="h" font-size="13">SCADA</text><text x="608" y="161" class="mono dim" font-size="9.5">historian / PI</text></g>
  </g>
  <g stroke="#473726" stroke-width="1.4">
    <line x1="104" y1="178" x2="104" y2="204" marker-end="url(#ar)"/>
    <line x1="242" y1="178" x2="242" y2="204" marker-end="url(#ar)"/>
    <line x1="380" y1="178" x2="380" y2="204" marker-end="url(#ar)"/>
    <line x1="518" y1="178" x2="518" y2="204" marker-end="url(#ar)"/>
    <line x1="656" y1="178" x2="656" y2="204" marker-end="url(#ar)"/>
  </g>

  <!-- ===== INGEST ===== -->
  <rect x="40" y="206" width="680" height="60" rx="9" fill="#15110D" stroke="#2A2118"/>
  <text x="60" y="232" class="h" font-size="14">Ingest · connectors</text>
  <text x="60" y="251" class="mono" fill="#C6B9A6" font-size="10">OPC-UA bridge · MQTT · CSV (/api/ingest) · edge pre-filter  →  digital twin · PlantSnapshot</text>
  <text x="700" y="232" class="mono br" font-size="9.5" text-anchor="end">connector,</text>
  <text x="700" y="248" class="mono dim" font-size="9.5" text-anchor="end">not a rewrite</text>
  <line x1="380" y1="266" x2="380" y2="292" stroke="#473726" stroke-width="1.4" marker-end="url(#ar)"/>

  <!-- ===== COMPOUND ENGINE (the core) ===== -->
  <rect x="40" y="296" width="680" height="244" rx="10" fill="#1A130B" stroke="#FF6A1A" stroke-width="2"/>
  <rect x="40" y="296" width="680" height="5" rx="2" fill="#FF6A1A"/>
  <text x="60" y="330" class="br" font-size="17" font-weight="700">COMPOUND-RISK ENGINE</text>
  <text x="60" y="349" class="mono" fill="#FF8A3D" font-size="10">the deterministic core · the IP</text>
  <text x="700" y="328" class="mono br" font-size="10" text-anchor="end">hybrid</text>
  <text x="700" y="344" class="mono dim" font-size="9" text-anchor="end">scoring backbone</text>

  <!-- col 1: feature extraction -->
  <text x="60" y="380" class="lbl" font-size="9.5">FEATURE EXTRACTION</text>
  <g font-size="10.5" fill="#C6B9A6">
    <text x="60" y="402">level + trend (baseline-subtracted)</text>
    <text x="60" y="421">ignition · in-zone / adjacent</text>
    <text x="60" y="440">personnel · in-zone / blast-radius</text>
    <text x="60" y="459">confined-space O2</text>
    <text x="60" y="478">fire-triangle oxidizer</text>
  </g>
  <line x1="280" y1="372" x2="280" y2="496" stroke="#2A2118" stroke-width="1"/>
  <!-- col 2: verdict gate -->
  <text x="298" y="380" class="lbl" font-size="9.5">VERDICT GATE</text>
  <g font-size="10.5" fill="#C6B9A6">
    <text x="298" y="402">explosion: fuel+ignition+O2+crew</text>
    <text x="298" y="421">asphyxiation: O2-deficient + crew</text>
    <text x="298" y="440">sensor-trust: suspect O2 ≠ suppress</text>
    <text x="298" y="459">inerting: two-key (O2 + air)</text>
  </g>
  <line x1="510" y1="372" x2="510" y2="496" stroke="#2A2118" stroke-width="1"/>
  <!-- col 3: outputs -->
  <text x="528" y="380" class="lbl" font-size="9.5">OUTPUTS</text>
  <g font-size="10.5" fill="#C6B9A6">
    <text x="528" y="402">compound flag</text>
    <text x="528" y="421">score 0–100 · level</text>
    <text x="528" y="440">time-to-threshold</text>
    <text x="528" y="459">ranked interventions</text>
    <text x="528" y="478">calibrated confidence</text>
  </g>
  <line x1="56" y1="506" x2="704" y2="506" stroke="#2A2118" stroke-width="1"/>
  <text x="380" y="526" class="mono br" font-size="9.5" text-anchor="middle">DETERMINISTIC · AUDITABLE · NO LLM IN THE DECISION · O(zones)/frame · ~0.65M tags/s single-core</text>

  <!-- ===== INTELLIGENCE LAYER (sidecar) ===== -->
  <rect x="760" y="296" width="400" height="340" rx="10" fill="#1C140C" stroke="#473726"/>
  <text x="782" y="326" class="mono br" font-size="11" letter-spacing="1">INTELLIGENCE LAYER</text>
  <text x="782" y="344" class="dim" font-size="10">LLM-assisted · explains · retrieves · drafts —</text>
  <text x="782" y="360" font-size="10" fill="#FF8A3D" font-style="italic">never makes the decision</text>
  <line x1="782" y1="372" x2="1138" y2="372" stroke="#2A2118" stroke-width="1"/>
  <g>
    <text x="782" y="394" class="h" font-size="11.5">6-stage reasoning graph</text><text x="782" y="409" class="mono dim" font-size="8.8">Sensor→Permit→Vision→Reasoner→RAG→Response · auditable</text>
    <text x="782" y="431" class="h" font-size="11.5">Disaster-Memory RAG</text><text x="782" y="446" class="mono dim" font-size="8.8">Gemini embeddings · 81% Vizag match</text>
    <text x="782" y="468" class="h" font-size="11.5">Vision (YOLOv8)</text><text x="782" y="483" class="mono dim" font-size="8.8">person + zone-intrusion · monitoring layer</text>
    <text x="782" y="505" class="h" font-size="11.5">Incident-pattern intelligence</text><text x="782" y="520" class="mono dim" font-size="8.8">recurring causal combinations</text>
    <text x="782" y="542" class="h" font-size="11.5">Compliance audit</text><text x="782" y="557" class="mono dim" font-size="8.8">OISD · DGMS · Factory Act</text>
    <text x="782" y="579" class="h" font-size="11.5">Shift-left permit gate · Pre-mortem</text><text x="782" y="594" class="mono dim" font-size="8.8">block before issue · hazards before they occur</text>
    <text x="782" y="616" class="h" font-size="11.5">Knowledge graph</text><text x="782" y="631" class="mono dim" font-size="8.8">gas→precursor→compound←precedent · networkx</text>
  </g>
  <!-- engine <-> intelligence (LLM-assist, not the decision path) -->
  <line x1="720" y1="420" x2="760" y2="420" stroke="#FF6A1A" stroke-width="1.3" stroke-dasharray="4 3" marker-start="url(#arB)" marker-end="url(#arB)"/>

  <!-- ===== RESPONSE ===== -->
  <line x1="380" y1="540" x2="380" y2="570" stroke="#473726" stroke-width="1.4" marker-end="url(#ar)"/>
  <text x="392" y="562" class="mono" fill="#FF2B4E" font-size="9">if compound ∧ score ≥ 40</text>
  <rect x="40" y="572" width="680" height="62" rx="9" fill="#190F0C" stroke="#FF2B4E" stroke-width="1.5"/>
  <circle cx="66" cy="603" r="5" fill="#FF2B4E"/>
  <text x="84" y="599" class="h" font-size="14">Response orchestrator</text>
  <text x="84" y="618" class="mono" fill="#C6B9A6" font-size="9">report · §36/37/38 · OISD-STD-105 · multilingual evac · multi-channel dispatch · evidence freeze · operator-gated</text>

  <!-- ===== CONTROL ROOM (full width) ===== -->
  <line x1="380" y1="634" x2="380" y2="664" stroke="#473726" stroke-width="1.4" marker-end="url(#ar)"/>
  <rect x="40" y="666" width="1120" height="62" rx="9" fill="#15110D" stroke="#2A2118"/>
  <text x="60" y="692" class="h" font-size="14">Next.js control room</text>
  <text x="60" y="711" class="mono" fill="#C6B9A6" font-size="9.5">split-reality HMI · plant schematic · fleet board · knowledge-graph view · booth / story modes</text>
  <text x="1140" y="692" class="mono br" font-size="10" text-anchor="end">FastAPI · 30 REST + WebSocket</text>
  <text x="1140" y="711" class="mono dim" font-size="9" text-anchor="end">edge or on-prem · data stays in the plant</text>

  <!-- ===== footer metrics + legend ===== -->
  <line x1="40" y1="758" x2="1160" y2="758" stroke="#2A2118" stroke-width="1"/>
  <text x="40" y="788" class="h" font-size="14"><tspan fill="#FF6A1A">100%</tspan> compound recall<tspan class="dim" font-weight="400">    ·    </tspan><tspan fill="#FF6A1A">0%</tspan> false-positive<tspan class="dim" font-weight="400">    ·    </tspan><tspan fill="#FF6A1A">7.4 min</tspan> mean lead</text>
  <text x="40" y="810" class="mono dim" font-size="10">29-scenario benchmark · 240-scenario held-out 100% / 3.3% FP · robustness 10/10 · property-tested · deterministic (seed = 42) · vs single-sensor baseline</text>
  <g class="mono" font-size="9.5">
    <rect x="820" y="778" width="12" height="12" rx="3" fill="none" stroke="#FF6A1A" stroke-width="1.5"/><text x="838" y="788" class="dim">deterministic decision core</text>
    <rect x="1010" y="778" width="12" height="12" rx="3" fill="none" stroke="#FF2B4E" stroke-width="1.5"/><text x="1028" y="788" class="dim">compound-response path</text>
  </g>
</svg>
